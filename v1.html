    <video class="page-hero__video" autoplay loop playsinline>
      <source src="images/video/v1.mp4" type="video/mp4" />
    </video>
    <div class="page-hero__content">
      <span class="breadcrumb"><a href="index.html" data-translate="home">الرئيسية</a> <i class="fa fa-angle-left"></i> <span data-translate="abu_simbel">المعلم السياحي</span></span>
      <h1 data-translate="abu_simbel">المعلم السياحي</h1>
      <p data-translate="p1">وصف مختصر عن المعلم.</p>
      <a href="https://ar.wikipedia.org/wiki/%D8%A3%D8%A8%D9%88_%D8%B3%D9%85%D8%A8%D9%84" class="btn btn--primary" data-translate="read_more" target="_blank" rel="noopener">

      <span class="section-tag" data-translate="abu_simbel">المعلم</span>

      <h2 class="section-title" data-translate="pic1">معرض الصور</h2>
      <div class="gallery__grid">
          <div class="gallery__item fade-in"><img src="images/pic1/pi1.jpg" alt="" loading="lazy" /></div>

          <div class="gallery__item fade-in"><img src="images/pic1/pi12.jpg" alt="" loading="lazy" /></div>
      </div>
    </div>

    <div class="container">
      <span class="section-tag" data-translate="geo_location_title">الموقع الجغرافي</span>
      <h2 class="section-title" data-translate="geo_location_title">الموقع</h2>
      <p class="section-body fade-in" data-translate="loc1">الموقع الجغرافي للمعلم.</p>
      <div class="map-wrap fade-in">
        <iframe
