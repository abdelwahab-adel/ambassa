    <video class="page-hero__video" autoplay loop playsinline>
      <source src="images/video/v12.mp4" type="video/mp4" />
    </video>
    <div class="page-hero__content">
      <span class="breadcrumb"><a href="index.html" data-translate="home">الرئيسية</a> <i class="fa fa-angle-left"></i> <span data-translate="high_dam">المعلم السياحي</span></span>

  <section class="info-sec" id="info">
    <div class="container">
      <span class="section-tag" data-translate="high_dam">المعلم</span>
      <h2 class="section-title" data-translate="inf12">معلومات عن المعلم</h2>
      <div class="info-body fade-in">
        <p data-translate="dec12">تفاصيل المعلم السياحي.</p>
      </div>
    </div>
  </section>

  <!-- ── GALLERY ── -->
  <section class="gallery-sec" id="gallery">
    <div class="container">
      <span class="section-tag" data-translate="pic12">الصور</span>
      <h2 class="section-title" data-translate="pic12">معرض الصور</h2>
      <div class="gallery__grid">

      <span class="section-tag" data-translate="geo_location_title">الموقع الجغرافي</span>
